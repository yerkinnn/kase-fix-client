# =====================================================================
#  KASE FIX CLIENT  -  QuickFIX/J session configuration
# =====================================================================
#
#  This file controls HOW your client connects to the FIX server.
#  Lines starting with '#' are comments and are ignored by the engine.
#
#  HOW IT IS ORGANIZED:
#    [DEFAULT]  -> settings shared by every session.
#    [SESSION]  -> settings for one specific FIX session (our KASE link).
#
#  >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
#  EVERYTHING YOU MUST REPLACE WITH REAL KASE DATA IS MARKED WITH:
#        SUBSTITUTE: <explanation>
#  Search this file for the word "SUBSTITUTE" to find them all quickly.
#  >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# =====================================================================

[DEFAULT]

# --- Connection type -------------------------------------------------
# "initiator" means WE actively connect TO the server (this is correct
# for a client). Do not change this.
ConnectionType=initiator

# --- FIX protocol version -------------------------------------------
# SUBSTITUTE: KASE order-entry uses FIX 4.4 in this template.
#             If KASE requires another version, change this value AND
#             swap the matching quickfixj-messages-fixXX dependency in pom.xml.
#             Examples: FIX.4.2 / FIX.4.4 / FIXT.1.1 (for FIX 5.0 SP2)
BeginString=FIX.4.4

# --- Reconnection behaviour -----------------------------------------
# If the connection drops, try again every 30 seconds.
ReconnectInterval=30

# --- Heartbeat -------------------------------------------------------
# How often (seconds) to exchange heartbeats to keep the link alive.
# KASE/MFIX accepts 1..60 seconds. 30 is the recommended value.
HeartBtInt=30

# --- Logon timeout ---------------------------------------------------
# The MFIX gateway can take ~5 seconds (sometimes more) to answer our
# Logon. Give it up to 30 seconds before QuickFIX/J gives up, otherwise
# a slow-but-valid logon could be aborted.
LogonTimeout=30
LogoutTimeout=10

# --- Data dictionary -------------------------------------------------
# The XML file that defines every valid FIX message/field for validation.
# The default FIX44.xml ships inside QuickFIX/J, so you normally do NOT
# need to provide your own. If KASE gives you a custom dictionary, point
# UseDataDictionary at it here.
UseDataDictionary=Y
# DataDictionary=config/KASE_FIX44.xml   # enable only if KASE supplies one

# --- Message validation ---------------------------------------------
# Keep these relaxed so KASE-specific custom tags don't get rejected.
ValidateUserDefinedFields=N
ValidateIncomingMessage=Y
AllowUnknownMsgFields=Y

# --- Sequence numbers ------------------------------------------------
# Reset sequence numbers to 1 on every logon. This keeps a simple client
# from getting "out of sync" during testing. In production KASE may ask
# you to set this to N (persistent sequence numbers).
ResetOnLogon=Y
ResetOnLogout=Y
ResetOnDisconnect=Y

# --- Where to store session state & logs ----------------------------
FileStorePath=target/fix-store
FileLogPath=logs/fix-messages

# --- Trading hours (start/end of FIX day) ---------------------------
# The session will be "active" between these UTC times. 00:00:00-00:00:00
# means "always on", which is convenient for testing.
StartTime=00:00:00
EndTime=00:00:00
TimeZone=UTC

[SESSION]

# =====================================================================
#  CURRENTLY CONFIGURED FOR: KASE TEST SYSTEM, MFIX "Trade" gateway
#  (order entry). This is the correct interface for placing and
#  cancelling orders (New Order / Cancel / Logon / Logout).
#
#  KASE TEST endpoints for reference:
#    - MFIX Trade         (order entry)   -> port 9215, TargetCompID MFIXTradeIDFond
#    - MFIX Trade Capture (trade reports) -> port 9214, TargetCompID MFIXTradeCaptureID
# =====================================================================

# --- WHO WE ARE (our identity, assigned by KASE) --------------------
# SenderCompID=NFGDM0FT01
SenderCompID=NFGDM0BT07

# --- WHO WE TALK TO (the KASE/MFIX gateway identity) ---------------
# MFIX Trade (order-entry) target on the KASE test system.
TargetCompID=MFIXTradeIDFond

# --- WHERE THE SERVER IS --------------------------------------------
# KASE test system.
SocketConnectHost=194.76.125.206

# Port 9215 = MFIX Trade (order entry). Use 9214 if you instead want
# the Trade Capture (trade-reports) feed.
SocketConnectPort=9215

# --- OPTIONAL: extra SenderSubID / TargetSubID ----------------------
# MFIX usually does NOT need these. Uncomment only if KASE asks.
# SenderSubID=YOUR_SENDER_SUB_ID
# TargetSubID=KASE_TARGET_SUB_ID

# --- LOGIN CREDENTIALS (sent inside the Logon message) --------------
# MFIX authenticates with the PASSWORD only (FIX tag 554) plus your
# SenderCompID. It does NOT use a Username (tag 553), so we leave the
# Username key OUT on purpose. If KASE ever tells you to send a
# username, uncomment the next line and fill it in.
# Username=YOUR_FIX_USERNAME
Password=TEST$123

# --- TLS / SSL -------------------------------------------------------
# SUBSTITUTE (if required): KASE may require an encrypted connection.
# If so, uncomment the next line. You may also need keystore settings;
# ask KASE for their TLS requirements.
# SocketUseSSL=Y
